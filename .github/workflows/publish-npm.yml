name: Publish npm

# Triggered after dist's release.yml completes successfully.
# Builds 7 npm packages (6 per-platform + 1 wrapper) using the
# optionalDependencies pattern (esbuild/biome/swc-style) and publishes
# them to npmjs.com. Zero transitive dependencies in the published
# packages, no postinstall download.
#
# Why workflow_run instead of `release: published`?
# GitHub silently suppresses event triggers for actions performed with
# GITHUB_TOKEN (anti-loop measure). dist's release.yml creates the
# release with GITHUB_TOKEN, so no `release: published` event fires.
# `workflow_run` chains on the upstream workflow's completion directly
# and isn't subject to that filter.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: read
  # Required for npm publish --provenance attestation.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Run on manual dispatch, OR when Release succeeded for a tag push
    # (filter out PR-triggered Release runs since release.yml runs on PRs too).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    env:
      # On workflow_run for a tag push, head_branch is the tag name (e.g. "v0.1.0").
      TAG: ${{ inputs.tag || github.event.workflow_run.head_branch }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # workflow_run checks out the default branch by default; pin to the
          # tagged ref so the build script matches what was released.
          ref: ${{ inputs.tag || github.event.workflow_run.head_branch }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist-artifacts
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir dist-artifacts \
            --pattern '*.tar.xz' \
            --pattern '*.zip'
          ls -la dist-artifacts

      - name: Build npm packages
        run: |
          version="${TAG#v}"
          node scripts/build-npm-packages.mjs \
            --version "$version" \
            --artifacts dist-artifacts \
            --out npm-dist
          ls -la npm-dist

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Publish all platform packages first so the wrapper's
          # optionalDependencies are immediately resolvable.
          for dir in npm-dist/runfile-*; do
            echo "Publishing $(jq -r .name "$dir/package.json")"
            (cd "$dir" && npm publish --access public --provenance)
          done

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          (cd npm-dist/runfile && npm publish --access public --provenance)
