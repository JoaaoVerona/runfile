name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true

jobs:
  release:
    uses: Skiley/rust-binary-publish/.github/workflows/release.yml@v1.0.0
    permissions:
      contents: write
      id-token: write
    with:
      bin: run
      extra-assets: schemas/v0.schema.json
      npm-description: "Runfile CLI — an easy-to-use, batteries-included task runner"
      npm-package: "@runfile/cli"
      tag: ${{ inputs.tag || github.ref_name }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
