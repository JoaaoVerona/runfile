name: Setup Runfile
description: Installs Runfile and add it to PATH
author: JoaaoVerona

inputs:
  version:
    description: 'Version to install. Defaults to latest. Ignored when `from-source` is true.'
    default: latest
  from-source:
    description: |
      If `true`, build runfile from the current checkout via `cargo build` and
      add `target/debug` to PATH instead of downloading a release archive.
      Used internally to test the working-tree version of the CLI; external
      consumers should leave this unset.
    default: 'false'
  secret-keys:
    description: |
      Optional newline-separated list of private encryption keys (one 64-char hex
      string per line) to make available for decrypting `encrypted:` env values.

      Required when targets in your Runfile decrypt env vars from encrypted .env files.
      Pass GitHub secrets directly here — the action exports them as
      `RUNFILE_PRIVATE_KEYS` for the job, so no OS credential store / keyring daemon
      is involved. The env var disappears with the runner.
    default: ''
  global-files:
    description: |
      Optional newline-separated list of Runfile.json paths to register as global files
      via `run :config global-files add`. Useful for layering CI-only targets on top of
      the project's main Runfile. Paths are resolved relative to the workflow's working
      directory (typically the checkout root).
    default: ''
  runfile-source:
    description: |
      Optional raw Runfile.json (or Runfile.json5) source. When set, the contents are
      written to a temp file on the runner and `RUNFILE_TARGET` is exported so every
      subsequent `run` invocation without an explicit `-f` flag uses that file instead
      of discovering one in the workspace.

      Intended for repositories that want to keep their full Runfile private: pass the
      source via a GitHub secret and the action will materialize it for the job.
      The file lives in `$RUNNER_TEMP` and disappears when the runner is torn down.
      Combine with `global-files` to layer secret content on top of a public base Runfile.
    default: ''
  env-file-source:
    description: |
      Optional raw `.env` file source (plaintext or encrypted). When set, the contents
      are written to a temp file on the runner and `RUNFILE_ENV_FILE_TARGET` is exported
      so `run :env inject` and `run :env decrypt` use that file by default when no
      positional path is given.

      Same rationale as `runfile-source`: encrypted env files are safer than plaintext
      ones, but exposing the ciphertext in an open-source repo is unnecessary attack
      surface. Pass the contents via a GitHub secret and the action will materialize
      it for the job. The file lives in `$RUNNER_TEMP` and disappears with the runner.
    default: ''

runs:
  using: composite
  steps:
    - name: Resolve target
      if: inputs.from-source != 'true'
      id: target
      shell: bash
      run: |
        case "$RUNNER_OS" in
          Linux)   os=unknown-linux-musl ;;
          macOS)   os=apple-darwin ;;
          Windows) os=pc-windows-msvc ;;
          *)       echo "Unsupported OS: $RUNNER_OS" >&2; exit 1 ;;
        esac

        case "$RUNNER_ARCH" in
          X64)   arch=x86_64 ;;
          ARM64) arch=aarch64 ;;
          *)     echo "Unsupported arch: $RUNNER_ARCH" >&2; exit 1 ;;
        esac

        if [ "$RUNNER_OS" = "Windows" ]; then ext=zip; else ext=tar.xz; fi

        echo "target=${arch}-${os}" >> "$GITHUB_OUTPUT"
        echo "ext=${ext}" >> "$GITHUB_OUTPUT"

    - name: Install runfile
      if: inputs.from-source != 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        TARGET: ${{ steps.target.outputs.target }}
        EXT: ${{ steps.target.outputs.ext }}
      run: |
        archive="runfile-cli-${TARGET}.${EXT}"

        if [ "$VERSION" = "latest" ]; then
          url="https://github.com/JoaaoVerona/runfile/releases/latest/download/${archive}"
        else
          url="https://github.com/JoaaoVerona/runfile/releases/download/${VERSION}/${archive}"
        fi

        install_dir="$RUNNER_TEMP/runfile-bin"
        mkdir -p "$install_dir"
        curl -fsSL "$url" -o "$RUNNER_TEMP/$archive"

        if [ "$EXT" = "zip" ]; then
          unzip -q "$RUNNER_TEMP/$archive" -d "$RUNNER_TEMP"
        else
          tar -xJf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP"
        fi

        mv "$RUNNER_TEMP/runfile-cli-${TARGET}"/run* "$install_dir/"
        echo "$install_dir" >> "$GITHUB_PATH"
        "$install_dir"/run* --version

    - name: Build runfile from source
      if: inputs.from-source == 'true'
      shell: bash
      run: |
        cargo build
        bin_dir="$GITHUB_WORKSPACE/target/debug"
        if [ "$RUNNER_OS" = "Windows" ]; then bin="$bin_dir/run.exe"; else bin="$bin_dir/run"; fi
        echo "$bin_dir" >> "$GITHUB_PATH"
        "$bin" --version

    # Export keys as `RUNFILE_PRIVATE_KEYS` instead of round-tripping them
    # through an OS credential store. On a single-use runner the keyring buys
    # us nothing — secrets already live in the job's env — and avoiding it
    # skips an apt-get + dbus-launch + gnome-keyring-daemon bootstrap that
    # only exists to support that round trip. `RUNFILE_PRIVATE_KEYS` is read
    # by the CLI's `keyring_keys::all_private_keys`, merged ahead of any
    # keyring blob, and only consulted when the env-build path actually hits
    # an `encrypted:` value.
    - name: Register secret keys
      if: inputs.secret-keys != ''
      shell: bash
      env:
        SECRET_KEYS: ${{ inputs.secret-keys }}
      run: |
        {
          echo 'RUNFILE_PRIVATE_KEYS<<__RUNFILE_KEYS_EOF__'
          printf '%s\n' "$SECRET_KEYS"
          echo '__RUNFILE_KEYS_EOF__'
        } >> "$GITHUB_ENV"

    - name: Materialize Runfile source
      if: inputs.runfile-source != ''
      shell: bash
      env:
        RUNFILE_SOURCE: ${{ inputs.runfile-source }}
      run: |
        path="$RUNNER_TEMP/runfile-source/Runfile.json5"
        mkdir -p "$(dirname "$path")"
        printf '%s\n' "$RUNFILE_SOURCE" > "$path"
        echo "RUNFILE_TARGET=$path" >> "$GITHUB_ENV"

    - name: Materialize env file source
      if: inputs.env-file-source != ''
      shell: bash
      env:
        ENV_FILE_SOURCE: ${{ inputs.env-file-source }}
      run: |
        path="$RUNNER_TEMP/runfile-source/.env"
        mkdir -p "$(dirname "$path")"
        printf '%s\n' "$ENV_FILE_SOURCE" > "$path"
        echo "RUNFILE_ENV_FILE_TARGET=$path" >> "$GITHUB_ENV"

    - name: Register global Runfiles
      if: inputs.global-files != ''
      shell: bash
      env:
        GLOBAL_FILES: ${{ inputs.global-files }}
      run: |
        printf '%s\n' "$GLOBAL_FILES" | while IFS= read -r line; do
          path="$(printf '%s' "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          [ -z "$path" ] && continue
          run :config global-files add "$path"
        done
