name: Bootstrap Runfile
description: Build the runfile binary and add it to PATH

runs:
  using: composite
  steps:
    - name: Build runfile
      shell: bash
      run: cargo build
    - name: Add runfile to PATH
      shell: bash
      run: echo "${{ github.workspace }}/target/debug" >> $GITHUB_PATH
    - name: Register Runfile-ci.json as a global file
      shell: bash
      run: run :config global-files add "${{ github.workspace }}/Runfile-ci.json"
